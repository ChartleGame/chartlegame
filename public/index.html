  // ── Auth state ───────────────────────────────────────────────────────────────
  const [user, setUser]             = useState(() => window.auth.getUser());
  const [showAuth, setShowAuth]     = useState(false);
  const [showPaywall, setShowPaywall] = useState(false);
  const [paywallReason, setPaywallReason] = useState("daily_limit");
  const [showSettings, setShowSettings] = useState(false);
  const [showSubscription, setShowSubscription] = useState(false);
  const [toast, setToast] = useState(null);
  const [practiceUsed, setPracticeUsed] = useState(0);

  // Sync practice usage from server on mount (and when user changes)
  useEffect(() => {
    if (!user) { setPracticeUsed(0); return; }
    window.apiFetch("/api/chart/practice-count")
      .then(data => setPracticeUsed(data.used || 0))
      .catch(() => {});
  }, [user]);

  const [page, setPage] = useState("game");
  const [phase, setPhase] = useState("setup");
  const [direction, setDirection] = useState(null);
  const [sl, setSl] = useState("");
  const [tp, setTp] = useState("");
  const [visibleFuture, setVisibleFuture] = useState(0);
  const [scoreData, setScoreData] = useState(null);
  const [indicators, setIndicators] = useState({ ma20: false, ma50: false, ma100: false });
  const [playInterval, setPlayInterval] = useState(null);
  const [error, setError] = useState("");
  const [drawings, setDrawings] = useState([]);
  const [activeTool, setActiveTool] = useState(null);
  const [previewPrice, setPreviewPrice] = useState(null);
  const [clearSignal, setClearSignal] = useState(0);
  const [isDark, setIsDark] = useState(true);
  const [lang, setLang] = useState("en");
  const L = LANG[lang];

  // ── Restore today's daily result from localStorage if already played ───────
  const dailyKey = `chartle_daily_${user?.id || "anon"}_${seed}`;
  useEffect(() => {
    if (!chartData && !isPractice) return; // wait for chart to load so we have resetVersion
    try {
      const saved = localStorage.getItem(dailyKey);
      if (saved && !isPractice) {
        const s = JSON.parse(saved);
        // If admin reset happened since this result was saved, invalidate it
        // resetVersion > 0 means admin has clicked reset at least once
        // Old saves without resetVersion (undefined) also get cleared
        if (chartData?.resetVersion > 0 && s.resetVersion !== chartData.resetVersion) {
          console.log("[Chartle] Admin reset detected — clearing saved result.");
          localStorage.removeItem(dailyKey);
          resetTradeState();
          return;
        }
        setDirection(s.direction);
        setSl(s.sl);
        setTp(s.tp);
        setScoreData(s.scoreData);
        setVisibleFuture(s.visibleFuture);
        setPhase("done");
      } else if (!isPractice && phase === "done") {
        // New user has no saved result — reset to setup
        resetTradeState();
      }
    } catch {}
  }, [seed, user, chartData]);

  // ── Invalidate saved result if the chart changed (e.g. after a redeploy) ──
  useEffect(() => {
    if (!chartData || isPractice || phase !== "done") return;
    try {
      const saved = localStorage.getItem(dailyKey);
      if (saved) {
        const s = JSON.parse(saved);
        if (s.entryPrice && s.entryPrice !== chartData.entryPrice) {
          console.log("[Chartle] Chart changed since last play — resetting.");
          localStorage.removeItem(dailyKey);
          resetTradeState();
        }
      }
    } catch {}
  }, [chartData]);

  // ── Load daily chart on mount ─────────────────────────────────────────────
  useEffect(() => {
    setChartLoading(true);
    setChartError("");
    window.apiFetch("/api/chart/daily")
      .then(data => {
        setChartData(data);
        setChartLoading(false);
      })
      .catch(err => {
        console.warn("Server chart unavailable, using synthetic:", err.message);
        // Fallback to synthetic if server is down
        const rng = mulberry32(seed);
        setChartData(generateOHLC(rng));
        setChartLoading(false);
        setChartError("Using offline chart — server unavailable");
      });
  }, [seed]);

  // ── Load a practice chart ─────────────────────────────────────────────────
  const loadPracticeChart = async () => {
    // Must be logged in
    if (!window.auth.isLoggedIn()) {
      setShowAuth(true);
      return;
    }
    // Fetch from server (server enforces the limit)
    setChartLoading(true);
    try {
      const data = await window.apiFetch(`/api/chart/practice/${practiceIdRef.current}`);
      practiceIdRef.current++;
      setChartData(data);
      setIsPractice(true);
      resetTradeState();
      setChartLoading(false);
      // Sync counter from server
      try {
        const usage = await window.apiFetch("/api/chart/practice-count");
        setPracticeUsed(usage.used || 0);
      } catch {}
    } catch(e) {
      setChartLoading(false);
      if (e.status === 403) {
        // Limit reached — sync counter and show paywall
        try {
          const usage = await window.apiFetch("/api/chart/practice-count");
          setPracticeUsed(usage.used || 0);
        } catch {}
        setPaywallReason("daily_limit");
        setShowPaywall(true);
      } else if (e.status === 401) {
        setShowAuth(true);
      } else {
        // Fallback: synthetic practice chart
        const rng = mulberry32(Math.random() * 999999 | 0);
        setChartData(generateOHLC(rng));
        setIsPractice(true);
        resetTradeState();
      }
    }
  };

  const resetTradeState = () => {
    setPhase("setup"); setDirection(null); setSl(""); setTp("");
    setVisibleFuture(0); setScoreData(null); setError("");
    setDrawings([]); setActiveTool(null); setPreviewPrice(null);
    setClearSignal(s => s + 1);
  };

  // ── Upgrade flow ─────────────────────────────────────────────────────────
  const handleUpgrade = async () => {
    setShowPaywall(false);
    if (!window.auth.isLoggedIn()) { setShowAuth(true); return; }
    try {
      const { url } = await window.apiFetch("/api/stripe/checkout", { method: "POST" });
      window.location.href = url;
    } catch(e) { alert("Could not start checkout: " + e.message); }
  };

  const handleManage = (action) => {
    if (action === "settings") { setShowSettings(true); return; }
    if (action === "subscription" || !action) { setShowSubscription(true); return; }
  };

  // Theme tokens — swap between dark and light
  const T = isDark ? {
    pageBg:       "#080c18",
    canvasBg:     "#0a0e1a",
    text:         "#ffffff",
    textMuted:    "rgba(255,255,255,0.3)",
    textFaint:    "rgba(255,255,255,0.2)",
    textSub:      "rgba(255,255,255,0.35)",
    textHalf:     "rgba(255,255,255,0.5)",
    textStrong:   "rgba(255,255,255,0.75)",
    textLabel:    "rgba(255,255,255,0.25)",
    textDim:      "rgba(255,255,255,0.15)",
    border:       "rgba(255,255,255,0.07)",
    borderFaint:  "rgba(255,255,255,0.06)",
    borderMed:    "rgba(255,255,255,0.1)",
    borderStr:    "rgba(255,255,255,0.2)",
    surface:      "rgba(255,255,255,0.02)",
    surfaceMed:   "rgba(255,255,255,0.04)",
    surfaceHov:   "rgba(255,255,255,0.08)",
    gridLine:     "rgba(255,255,255,0.04)",
    priceLabel:   "rgba(255,255,255,0.3)",
    entryLine:    "rgba(255,255,255,0.5)",
    entryFill:    "rgba(255,255,255,0.7)",
    priceTagBg:   "#0a0e1a",
    priceTagBdr:  "rgba(255,255,255,0.3)",
    priceTagTxt:  "#ffffff",
    scoreOverlay: "rgba(8,12,24,0.72)",
    pillBg:       "rgba(10,14,26,0.82)",
    tooltipBg:    "#1e2535",
    tooltipBdr:   "rgba(255,255,255,0.1)",
    bull:         "#00ff96",
    bear:         "#ff5050",
    volBull:      (f) => f ? "rgba(0,255,150,0.08)"  : "rgba(0,255,150,0.12)",
    volBear:      (f) => f ? "rgba(255,80,80,0.08)"  : "rgba(255,80,80,0.12)",
    green:        "#00ff96",
    greenDim:     "rgba(0,255,150,0.08)",
    greenBdr:     "rgba(0,255,150,0.2)",
    greenBdrHi:   "rgba(0,255,150,0.3)",
    greenBdrPrev: "rgba(0,255,150,0.5)",
    greenBg:      "rgba(0,255,150,0.06)",
    greenBgPrev:  "rgba(0,255,150,0.12)",
    greenBgSaved: "rgba(0,255,150,0.15)",
    greenBgBtn:   "rgba(0,255,150,0.07)",
    greenBgDir:   "rgba(0,255,150,0.1)",
    greenGrad:    "linear-gradient(135deg, #00ff96, #00cc77)",
    greenGlow:    "0 0 24px rgba(0,255,150,0.3)",
    greenLong:    "linear-gradient(90deg, #00cc77, #00ff96)",
    labelFont:    "10px 'JetBrains Mono', monospace",
    boldFont:     "bold 10px 'JetBrains Mono', monospace",
  } : {
    pageBg:       "#e8ecf2",
    canvasBg:     "#f5f7fb",
    text:         "#0a0d14",
    textMuted:    "#3a4155",
    textFaint:    "#5a6178",
    textSub:      "#3d4560",
    textHalf:     "#2e3550",
    textStrong:   "#0d1020",
    textLabel:    "#4a5270",
    textDim:      "#6a738a",
    border:       "rgba(0,0,0,0.18)",
    borderFaint:  "rgba(0,0,0,0.12)",
    borderMed:    "rgba(0,0,0,0.24)",
    borderStr:    "rgba(0,0,0,0.38)",
    surface:      "rgba(0,0,0,0.06)",
    surfaceMed:   "rgba(0,0,0,0.10)",
    surfaceHov:   "rgba(0,0,0,0.15)",
    gridLine:     "rgba(0,0,0,0.10)",
    priceLabel:   "#3a4155",
    entryLine:    "rgba(0,0,0,0.55)",
    entryFill:    "rgba(0,0,0,0.80)",
    priceTagBg:   "#d8dde8",
    priceTagBdr:  "rgba(0,0,0,0.35)",
    priceTagTxt:  "#0a0d14",
    scoreOverlay: "rgba(210,216,228,0.92)",
    pillBg:       "rgba(210,216,228,0.95)",
    tooltipBg:    "#ffffff",
    tooltipBdr:   "rgba(0,0,0,0.12)",
    bull:         "#007a40",
    bear:         "#c41f1f",
    volBull:      (f) => f ? "rgba(0,122,64,0.12)"   : "rgba(0,122,64,0.22)",
    volBear:      (f) => f ? "rgba(196,31,31,0.12)"  : "rgba(196,31,31,0.22)",
    green:        "#007a40",
    greenDim:     "rgba(0,100,55,0.10)",
    greenBdr:     "rgba(0,100,55,0.30)",
    greenBdrHi:   "rgba(0,100,55,0.45)",
    greenBdrPrev: "rgba(0,100,55,0.60)",
    greenBg:      "rgba(0,100,55,0.08)",
    greenBgPrev:  "rgba(0,100,55,0.14)",
    greenBgSaved: "rgba(0,100,55,0.12)",
    greenBgBtn:   "rgba(0,100,55,0.09)",
    greenBgDir:   "rgba(0,100,55,0.10)",
    greenGrad:    "linear-gradient(135deg, #007a40, #005c30)",
    greenGlow:    "0 0 24px rgba(0,122,64,0.25)",
    greenLong:    "linear-gradient(90deg, #005c30, #007a40)",
    labelFont:    "bold 11px 'JetBrains Mono', monospace",
    boldFont:     "bold 11px 'JetBrains Mono', monospace",
  };

  // Keep body background in sync for smooth transition
  useEffect(() => {
    document.body.style.background = T.pageBg;
    document.body.style.transition = "background 0.25s";
  }, [isDark]);

  // Show loading screen while fetching chart
  if (chartLoading || !chartData) {
    return (
      <div style={{ height: "100vh", background: "#080c18", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
        <div style={{ fontSize: 24, fontWeight: 900, fontFamily: "'Space Grotesk', sans-serif", letterSpacing: -1, color: "#fff" }}>
          CHAR<span style={{ color: "#00ff96" }}>TLE</span>
        </div>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: 3, animation: "pulse 1.5s infinite" }}>
          {L ? L.loadingChart : "LOADING CHART..."}
        </div>
      </div>
    );
  }
  const { candles, future, asset, tf, entryPrice } = chartData;

  const handleTrade = () => {
    const slNum = parseFloat(sl), tpNum = parseFloat(tp);
    if (!direction) { setError(L.errDirection); return; }
    if (isNaN(slNum) || isNaN(tpNum)) { setError(L.errSlTp); return; }
    if (direction === "long" && slNum >= entryPrice) { setError(L.errSlLong); return; }
    if (direction === "long" && tpNum <= entryPrice) { setError(L.errTpLong); return; }
    if (direction === "short" && slNum <= entryPrice) { setError(L.errSlShort); return; }
    if (direction === "short" && tpNum >= entryPrice) { setError(L.errTpShort); return; }
    setError(""); setPhase("playing"); setActiveTool(null);
    let bar = 0;
    const iv = setInterval(() => {
      bar++;
      setVisibleFuture(bar);
      const result = calcScore(direction, entryPrice, slNum, tpNum, chartData.future.slice(0, bar));
      if (result.result !== "timeout" || bar >= future.length) {
        clearInterval(iv);
        const finalScore = calcScore(direction, entryPrice, slNum, tpNum, chartData.future);
        setScoreData(finalScore);
        setPhase("done");
        // Persist daily result so it survives page reload
        if (!isPractice) {
          try {
            localStorage.setItem(dailyKey, JSON.stringify({
              direction, sl: String(slNum), tp: String(tpNum),
              scoreData: finalScore, visibleFuture: chartData.future.length,
              entryPrice, resetVersion: chartData.resetVersion,
            }));
          } catch {}
          // Submit to consensus (fire and forget — server ignores duplicates)
          if (window.auth.isLoggedIn()) {
            window.apiFetch("/api/consensus", {
              method: "POST",
              body: JSON.stringify({ seed, direction, sl: slNum, tp: tpNum, score: finalScore.score, result: finalScore.result }),
            }).catch(() => {});
          }
        }
      }
    }, 220);
    setPlayInterval(iv);
  };

  const handleReset = () => {
    loadPracticeChart();
  };

  const tradeLines = (phase !== "setup" || sl || tp) ? {
    sl: parseFloat(sl) || null, tp: parseFloat(tp) || null, direction
  } : null;

  return (
    <div style={{ height: "100vh", background: T.pageBg, fontFamily: "'JetBrains Mono', monospace", color: T.text, display: "flex", flexDirection: "column", overflow: "hidden", fontWeight: isDark ? 400 : 600 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700;900&display=swap');
        * { box-sizing: border-box; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.95);} to {opacity:1;transform:scale(1);} }
        @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.5;} }
        @keyframes toastShrink { from { width: 100%; } to { width: 0%; } }
        body { font-weight: ${isDark ? 400 : 600}; }
        button:hover .tool-tip { opacity: 1 !important; }
        div:hover > div.tool-tip { opacity: 1 !important; }
      `}</style>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 24px", borderBottom: `1px solid ${T.borderFaint}`, background: T.surface }}>
        <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, cursor: "pointer" }} onClick={() => setPage("game")}>
            <span style={{ fontSize: 20, fontWeight: 900, fontFamily: "'Space Grotesk', sans-serif", letterSpacing: -1 }}>CHAR<span style={{ color: T.green }}>TLE</span></span>
            <span style={{ fontSize: 10, color: T.textMuted, letterSpacing: 2 }}>{L.dailyTrade}</span>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            {[["game",L.navTrade],["journal",L.navJournal],["consensus",L.navConsensus],
              ...(user?.isAdmin ? [["admin", L.navAdmin]] : [])
            ].map(([p, label]) => (
              <button key={p} onClick={() => setPage(p)} style={{
                padding: "5px 14px", borderRadius: 5, fontSize: 11, cursor: "pointer", letterSpacing: 1,
                border: `1px solid ${page === p ? T.borderStr : T.borderFaint}`,
                background: page === p ? T.surfaceHov : "transparent",
                color: page === p ? T.text : T.textSub,
                fontFamily: "'JetBrains Mono', monospace", transition: "all 0.15s",
              }}>{label}</button>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 22, fontWeight: 900, fontFamily: "'Space Grotesk', sans-serif", letterSpacing: -0.5, color: T.text }}>{asset}</div>
          <div style={{ padding: "4px 10px", borderRadius: 6, background: T.greenDim, border: `1px solid ${T.greenBdr}`, fontSize: 13, fontWeight: 700, color: T.green, fontFamily: "'Space Grotesk', sans-serif", letterSpacing: 1 }}>{tf}</div>
          <button
            onClick={() => setIsDark(d => !d)}
            title={isDark ? L.switchLight : L.switchDark}
            style={{
              width: 34, height: 34, borderRadius: 8, border: `1px solid ${T.border}`,
              background: T.surface, color: T.textMuted, cursor: "pointer",
              fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.2s", flexShrink: 0, fontFamily: "monospace",
            }}
          >{isDark ? "☀" : "☾"}</button>
          <button
            onClick={() => setLang(l => l === "en" ? "fr" : "en")}
            title={lang === "en" ? "Passer en français" : "Switch to English"}
            style={{
              height: 34, padding: "0 10px", borderRadius: 8, border: `1px solid ${T.border}`,
              background: T.surface, color: T.textMuted, cursor: "pointer",
              fontSize: 10, fontWeight: 700, letterSpacing: 1, display: "flex",
              alignItems: "center", justifyContent: "center",
              transition: "all 0.2s", flexShrink: 0, fontFamily: "'JetBrains Mono', monospace",
            }}
          >{lang === "en" ? "FR" : "EN"}</button>

          {/* Account */}
          <AccountButton
            T={T} L={L}
            user={user}
            onLogin={() => setShowAuth(true)}
            onLogout={() => { window.auth.clear(); setUser(null); setPage("game"); setToast(L.toastLoggedOut); setTimeout(() => setToast(null), 3000); }}
            onManage={handleManage}
          />
        </div>
      </div>

      {/* Practice bar — shown below header when on game page */}
      {page === "game" && (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "6px 24px",
          background: T.surfaceMed,
          borderBottom: `1px solid ${T.borderFaint}`,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {isPractice && (
              <span style={{ fontSize: 9, letterSpacing: 2, color: "#a78bfa", padding: "2px 8px", borderRadius: 4, background: "rgba(167,139,250,0.1)", border: "1px solid rgba(167,139,250,0.2)" }}>
                PRACTICE
              </span>
            )}
            {chartError && (
              <span style={{ fontSize: 9, color: "#f59e0b", letterSpacing: 1 }}>⚠ {chartError}</span>
            )}
            {!isPractice && !chartError && (
              <span style={{ fontSize: 9, color: T.textDim, letterSpacing: 2 }}>{L.dailyChartLabel}</span>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {/* Practice usage counter for free users */}
            {user && !window.auth.isPaid() && (
              <div style={{ fontSize: 9, color: T.textDim, letterSpacing: 1 }}>
                <span style={{ color: practiceUsed >= 3 ? "#ff5050" : T.textMuted }}>
                  {practiceUsed}/3
                </span>
                {" "}{L.practiceToday}
              </div>
            )}
            <button
              onClick={loadPracticeChart}
              disabled={phase === "playing"}
              style={{
                padding: "5px 14px", borderRadius: 5, fontSize: 10, letterSpacing: 1,
                cursor: phase === "playing" ? "not-allowed" : "pointer",
                border: `1px solid ${T.borderMed}`, background: T.surface,
                color: T.textMuted, fontFamily: "'JetBrains Mono', monospace",
                transition: "all 0.15s",
              }}>
              {L.newPracticeBtn}
            </button>
          </div>
        </div>
      )}

      {page === "journal" && <JournalPage seed={seed} scoreData={scoreData} direction={direction} sl={sl} tp={tp} entryPrice={entryPrice} asset={asset} tf={tf} T={T} L={L} user={user} onLogin={() => setShowAuth(true)} />}
      {page === "consensus" && <ConsensusPage seed={seed} scoreData={scoreData} direction={direction} sl={parseFloat(sl)||null} tp={parseFloat(tp)||null} entryPrice={entryPrice} T={T} L={L} user={user} />}
      {page === "admin" && user?.isAdmin && <AdminPanel T={T} L={L} />}

      {/* Chart area */}
      <div style={{ flex: 1, minHeight: 0, display: page === "game" ? "flex" : "none", flexDirection: "column", padding: "12px 16px 0 16px", gap: 10, overflow: "hidden" }}>
        <div style={{ flex: 1, minHeight: 0, display: "flex", gap: 10, alignItems: "stretch" }}>

          {/* Drawing tray */}
          <DrawingTray
            activeTool={activeTool}
            setActiveTool={setActiveTool}
            indicators={indicators}
            setIndicators={setIndicators}
            T={T}
            L={L}
            onClear={() => {
              setDrawings([]);
              setSl("");
              setTp("");
              setDirection(null);
              setPreviewPrice(null);
              setActiveTool(null);
              setClearSignal(s => s + 1);
            }}
          />

          {/* Chart */}
          <div style={{ flex: 1, minWidth: 0, minHeight: 0, position: "relative", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.07)" }}>
            <CandleChart
              candles={candles} future={future} visibleFuture={visibleFuture}
              indicators={indicators} tradeLines={tradeLines}
              phase={phase} entryPrice={entryPrice}
              drawings={drawings}
              activeTool={phase === "setup" ? activeTool : null}
              clearSignal={clearSignal}
              onDrawingAdd={(d) => setDrawings(prev => [...prev, d])}
              onSetSl={(p) => {
                const newSl = p.toFixed(2);
                setSl(newSl);
                setPreviewPrice(null);
                setActiveTool(null);
                const tpNum = parseFloat(tp);
                if (!isNaN(tpNum)) setDirection(tpNum > p ? "long" : "short");
              }}
              onSetTp={(p) => {
                const newTp = p.toFixed(2);
                setTp(newTp);
                setPreviewPrice(null);
                setActiveTool(null);
                const slNum = parseFloat(sl);
                if (!isNaN(slNum)) setDirection(p > slNum ? "long" : "short");
              }}
              T={T}
              previewPrice={previewPrice}
              onPreviewPrice={(preview) => {
                // Always update preview price so R:R ratio recalculates while
                // placing either SL or TP, even if the other line is already set.
                setPreviewPrice(preview);
              }}
            />
            {phase === "done" && scoreData && <ScorePanel scoreData={scoreData} onReset={handleReset} T={T} L={L} />}
            {phase === "playing" && (
              <div style={{ position: "absolute", top: 12, left: 12, background: T.greenDim, border: `1px solid ${T.greenBdrHi}`, borderRadius: 6, padding: "6px 14px", fontSize: 11, color: T.green, letterSpacing: 2, animation: "pulse 1s infinite" }}>{L.liveLabel}</div>
            )}
            {activeTool && phase === "setup" && (
              <div style={{ position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)", background: "rgba(56,189,248,0.1)", border: "1px solid rgba(56,189,248,0.25)", borderRadius: 6, padding: "5px 14px", fontSize: 10, color: "#38bdf8", letterSpacing: 1, pointerEvents: "none" }}>
                {activeTool === "hline" && L.hintHline}
                {activeTool === "trendline" && L.hintTrend}
                {activeTool === "multitouch" && L.hintMulti}
                {activeTool === "set-sl" && L.hintSetSl}
                {activeTool === "set-tp" && L.hintSetTp}
              </div>
            )}
          </div>
        </div>{/* end chart+tray flex row */}

        {/* Sticky bottom panel: trade controls + instructions */}
        <div style={{ flexShrink: 0, display: "flex", flexDirection: "column", gap: 8, paddingBottom: 12 }}>

        {/* Trade Controls */}
        {(() => {
          // Derive live display values from previewPrice when one line is being placed
          const previewSl   = previewPrice?.tool === "set-sl" ? previewPrice.price : null;
          const previewTp   = previewPrice?.tool === "set-tp" ? previewPrice.price : null;
          const displaySl   = previewSl !== null ? previewSl   : parseFloat(sl)   || null;
          const displayTp   = previewTp !== null ? previewTp   : parseFloat(tp)   || null;
          const displayDir  = previewPrice
            ? (displaySl !== null && displayTp !== null ? (displayTp > displaySl ? "long" : "short")
                : previewSl !== null ? (previewSl < entryPrice ? "long" : "short")
                : previewTp !== null ? (previewTp > entryPrice ? "long" : "short")
                : direction)
            : direction;
          const displayRR   = displaySl !== null && displayTp !== null
            ? Math.abs(displayTp - entryPrice) / Math.abs(displaySl - entryPrice)
            : null;
          const isPreviewing = previewPrice !== null;

          return (
        <div style={{ display: "flex", gap: 0, alignItems: "stretch", background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, overflow: "hidden" }}>

          {/* Entry */}
          <div style={{ flex: 1, padding: "14px 18px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: 2, marginBottom: 6 }}>{L.entryPrice}</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.text, fontFamily: "'Space Grotesk', sans-serif" }}>{entryPrice.toFixed(2)}</div>
            <div style={{ fontSize: 9, color: T.textFaint, marginTop: 3 }}>{L.marketOpen}</div>
          </div>
          <div style={{ width: 1, background: T.borderFaint }} />

          {/* Direction */}
          <div style={{ flex: 2, padding: "14px 18px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: 2, marginBottom: 8 }}>{L.direction}</div>
            <div style={{ display: "flex", gap: 8 }}>
              {[["long",L.long,T.green],["short",L.short,"#ff5050"]].map(([d,label,color]) => (
                <button key={d} onClick={() => phase === "setup" && setDirection(d)} disabled={phase !== "setup"} style={{ flex: 1, padding: "10px 0", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: phase === "setup" ? "pointer" : "not-allowed", border: `2px solid ${displayDir === d ? color : T.border}`, background: displayDir === d ? `${color}18` : "transparent", color: displayDir === d ? color : T.textMuted, letterSpacing: 1, transition: "all 0.15s", fontFamily: "'JetBrains Mono', monospace" }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{ width: 1, background: T.borderFaint }} />

          {/* SL */}
          <div style={{ flex: 2, padding: "14px 18px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontSize: 9, color: "#ff5050", letterSpacing: 2, marginBottom: 8 }}>{L.stopLoss}</div>
            <input type="number"
              value={isPreviewing && previewSl !== null ? previewSl.toFixed(2) : sl}
              onChange={e => {
                if (phase !== "setup") return;
                setSl(e.target.value);
                const slNum = parseFloat(e.target.value);
                const tpNum = parseFloat(tp);
                if (!isNaN(slNum) && !isNaN(tpNum)) setDirection(tpNum > slNum ? "long" : "short");
              }}
              placeholder={entryPrice.toFixed(2)} disabled={phase !== "setup"}
              style={{ width: "100%", padding: "10px 12px", background: isPreviewing && previewSl !== null ? "rgba(255,80,80,0.12)" : "rgba(255,80,80,0.06)", border: `1px solid ${isPreviewing && previewSl !== null ? "rgba(255,80,80,0.5)" : "rgba(255,80,80,0.2)"}`, borderRadius: 6, color: "#ff8080", fontSize: 13, outline: "none", fontFamily: "'JetBrains Mono', monospace", transition: "all 0.1s" }} />
            <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
              {[2, 3, 4].map(r => {
                const tpNum = parseFloat(tp);
                const canApply = phase === "setup" && direction && !isNaN(tpNum);
                return (
                  <button key={r} onClick={() => {
                    if (!canApply) return;
                    const reward = Math.abs(tpNum - entryPrice);
                    const newSl = direction === "long" ? entryPrice - reward / r : entryPrice + reward / r;
                    setSl(newSl.toFixed(2));
                  }} disabled={!canApply} style={{ flex: 1, padding: "5px 0", borderRadius: 4, fontSize: 10, border: "1px solid rgba(255,80,80,0.2)", background: canApply ? "rgba(255,80,80,0.07)" : T.surfaceMed, color: canApply ? "#ff8080" : T.textDim, cursor: canApply ? "pointer" : "not-allowed", fontFamily: "'JetBrains Mono', monospace", transition: "all 0.15s" }}>1:{r}</button>
                );
              })}
            </div>
          </div>
          <div style={{ width: 1, background: T.borderFaint }} />

          {/* TP */}
          <div style={{ flex: 2, padding: "14px 18px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontSize: 9, color: T.green, letterSpacing: 2, marginBottom: 8 }}>{L.takeProfit}</div>
            <input type="number"
              value={isPreviewing && previewTp !== null ? previewTp.toFixed(2) : tp}
              onChange={e => {
                if (phase !== "setup") return;
                setTp(e.target.value);
                const tpNum = parseFloat(e.target.value);
                const slNum = parseFloat(sl);
                if (!isNaN(tpNum) && !isNaN(slNum)) setDirection(tpNum > slNum ? "long" : "short");
              }}
              placeholder={entryPrice.toFixed(2)} disabled={phase !== "setup"}
              style={{ width: "100%", padding: "10px 12px", background: isPreviewing && previewTp !== null ? T.greenBgPrev : T.greenBg, border: `1px solid ${isPreviewing && previewTp !== null ? T.greenBdrPrev : T.greenBdr}`, borderRadius: 6, color: T.green, fontSize: 13, outline: "none", fontFamily: "'JetBrains Mono', monospace", transition: "all 0.1s" }} />
            <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
              {[2,3,4].map(r => {
                const slNum = parseFloat(sl);
                const canApply = phase === "setup" && direction && !isNaN(slNum);
                return (
                  <button key={r} onClick={() => { if (!canApply) return; const risk = Math.abs(entryPrice - slNum); setTp((direction === "long" ? entryPrice + risk * r : entryPrice - risk * r).toFixed(2)); }} disabled={!canApply} style={{ flex: 1, padding: "5px 0", borderRadius: 4, fontSize: 10, border: `1px solid ${T.greenBdr}`, background: canApply ? T.greenBgBtn : T.surfaceMed, color: canApply ? T.green : T.textDim, cursor: canApply ? "pointer" : "not-allowed", fontFamily: "'JetBrains Mono', monospace", transition: "all 0.15s" }}>1:{r}</button>
                );
              })}
            </div>
          </div>
          <div style={{ width: 1, background: T.borderFaint }} />

          {/* RR */}
          <div style={{ flex: 1, padding: "14px 18px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: 2, marginBottom: 6 }}>{L.rrRatio}</div>
            <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif", color: isPreviewing && displayRR !== null ? "#38bdf8" : "#60a5fa", transition: "color 0.15s" }}>
              {displayRR !== null ? "1:" + displayRR.toFixed(2) : "—"}
            </div>
          </div>
          <div style={{ width: 1, background: T.borderFaint }} />

          {/* Submit */}
          <div style={{ flex: 2, padding: "14px 18px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            {error && <div style={{ fontSize: 10, color: "#ff5050", marginBottom: 6 }}>{error}</div>}
            <button onClick={handleTrade} disabled={phase !== "setup"} style={{ width: "100%", padding: "14px 0", borderRadius: 8, fontSize: 13, fontWeight: 700, background: phase === "setup" ? T.greenGrad : T.surfaceMed, color: phase === "setup" ? "#000" : T.textFaint, border: "none", cursor: phase === "setup" ? "pointer" : "not-allowed", letterSpacing: 2, transition: "all 0.2s", fontFamily: "'JetBrains Mono', monospace", boxShadow: phase === "setup" ? T.greenGlow : "none" }}>
              {phase === "setup" ? L.execute : phase === "playing" ? L.playing : L.done}
            </button>
          </div>
        </div>
          ); // end return inside IIFE
        })()} {/* end IIFE */}

        {/* ── Instruction Box ── */}
        <div style={{
          background: T.surface,
          border: `1px solid ${T.border}`,
          borderRadius: 10,
          padding: "14px 20px",
          display: "grid",
          gridTemplateColumns: "repeat(4, 1fr)",
          gap: "12px 24px",
        }}>
          {[
            {
              step: "01",
              title: L.step01,
              color: "#60a5fa",
              lines: [
                L.hint01a,
                L.hint01b,
                L.hint01c,
              ],
            },
            {
              step: "02",
              title: L.step02,
              color: "#38bdf8",
              lines: [
                L.hint02a,
                L.hint02b,
                L.hint02c,
              ],
            },
            {
              step: "03",
              title: L.step03,
              color: "#a78bfa",
              lines: [
                L.hint03a,
                L.hint03b,
                L.hint03c,
              ],
            },
            {
              step: "04",
              title: L.step04,
              color: T.green,
              lines: [
                L.hint04a,
                L.hint04b,
                L.hint04c,
              ],
            },
          ].map(({ step, title, color, lines }) => (
            <div key={step}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 7 }}>
                <span style={{ fontSize: 9, fontWeight: 700, color, opacity: 0.5, letterSpacing: 2 }}>{step}</span>
                <span style={{ fontSize: 11, fontWeight: 700, color, letterSpacing: 1 }}>{title}</span>
              </div>
              {lines.map((l, i) => (
                <div key={i} style={{ display: "flex", gap: 4, fontSize: 10, color: T.textMuted, marginBottom: 3, lineHeight: 1.5 }}>
                  <span style={{ flexShrink: 0 }}>·</span>
                  <span style={{ flex: 1 }}>{l}</span>
                </div>
              ))}
            </div>
          ))}
        </div>{/* end instruction box */}
        </div>{/* end sticky bottom panel */}
      </div>{/* end game page */}
      {/* ── Modals ── */}
      {showAuth && (
        <AuthModal T={T} L={L}
          onSuccess={(u) => { setUser(u); setShowAuth(false); }}
          onClose={() => setShowAuth(false)}
        />
      )}
      {showPaywall && (
        <PaywallModal T={T} L={L} user={user}
          reason={paywallReason}
          onClose={() => setShowPaywall(false)}
          onUpgrade={handleUpgrade}
        />
      )}
      {showSettings && user && (
        <AccountSettingsModal T={T} L={L} user={user}
          onClose={() => setShowSettings(false)}
          onUserUpdate={(u) => { setUser(u); if (!u) { setShowSettings(false); } }}
        />
      )}
      {showSubscription && user && (
        <SubscriptionModal T={T} L={L} user={user}
          onClose={() => setShowSubscription(false)}
          onUpgrade={handleUpgrade}
        />
      )}
      {/* Toast notification */}
      {toast && (
        <div onClick={() => setToast(null)} style={{
          position: "fixed", top: 20, right: 20, zIndex: 2000,
          background: T.surface, border: `1px solid ${T.greenBdr}`,
          borderRadius: 10, padding: "12px 20px 0 20px",
          boxShadow: "0 8px 32px rgba(0,0,0,0.4)",
          animation: "fadeIn 0.2s ease",
          cursor: "pointer", overflow: "hidden",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, paddingBottom: 12 }}>
            <span style={{ color: T.green, fontSize: 14 }}>✓</span>
            <span style={{ fontSize: 12, color: T.text, fontFamily: "'JetBrains Mono', monospace" }}>{toast}</span>
          </div>
          <div style={{
            height: 3, borderRadius: "0 0 10px 10px",
            background: T.green, opacity: 0.5,
            animation: "toastShrink 3s linear forwards",
            marginLeft: -20, marginRight: -20,
          }} />
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ChartGame />);
  </script>
</body>
</html>
