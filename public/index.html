<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chartle</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #080c18; transition: background 0.25s; }
    #root { height: 100%; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      const PREFIX = "chartgame::";
      function lsKey(key, shared) { return PREFIX + (shared ? "shared:" : "user:") + key; }
      window.storage = {
        async get(key, shared = false) {
          const raw = localStorage.getItem(lsKey(key, shared));
          if (raw === null) throw new Error("not found");
          return { key, value: raw, shared };
        },
        async set(key, value, shared = false) {
          localStorage.setItem(lsKey(key, shared), value);
          return { key, value, shared };
        },
        async delete(key, shared = false) {
          localStorage.removeItem(lsKey(key, shared));
          return { key, deleted: true, shared };
        },
        async list(prefix = "", shared = false) {
          const ns = lsKey(prefix, shared);
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith(ns))
              keys.push(k.slice((PREFIX + (shared ? "shared:" : "user:")).length));
          }
          return { keys, prefix, shared };
        },
      };
    })();
  </script>
  <script>
    // ── API config ─────────────────────────────────────────────────────────────
    window.API_BASE = "";  // same origin — change to "https://yourdomain.com" in production

    // ── Migrate old localStorage keys (tradle → chartle) ─────────────────────
    if (localStorage.getItem("tradle_token") && !localStorage.getItem("chartle_token")) {
      localStorage.setItem("chartle_token", localStorage.getItem("tradle_token"));
      localStorage.setItem("chartle_user", localStorage.getItem("tradle_user"));
      localStorage.removeItem("tradle_token");
      localStorage.removeItem("tradle_user");
    }

    // ── Auth token storage ─────────────────────────────────────────────────────
    window.auth = {
      getToken:  () => localStorage.getItem("chartle_token"),
      setToken:  (t) => { if (t) localStorage.setItem("chartle_token", t); else localStorage.removeItem("chartle_token"); },
      getUser:   () => { try { return JSON.parse(localStorage.getItem("chartle_user") || "null"); } catch { return null; } },
      setUser:   (u) => { if (u) localStorage.setItem("chartle_user", JSON.stringify(u)); else localStorage.removeItem("chartle_user"); },
      clear:     () => { localStorage.removeItem("chartle_token"); localStorage.removeItem("chartle_user"); },
      isLoggedIn:() => !!localStorage.getItem("chartle_token"),
      isPaid:    () => { const u = window.auth.getUser(); return u?.subscription?.status === "active"; },
    };

    // ── Authenticated fetch wrapper ─────────────────────────────────────────────
    window.apiFetch = async (path, opts = {}) => {
      const token = window.auth.getToken();
      const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
      if (token) headers["Authorization"] = "Bearer " + token;
      const res = await fetch(window.API_BASE + path, { ...opts, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw Object.assign(new Error(data.error || "Request failed"), { status: res.status, data });
      return data;
    };

    // ── Practice chart usage tracker ───────────────────────────────────────────
    window.practiceUsage = {
      todayKey: () => new Date().toISOString().slice(0, 10),
      getCount: () => {
        const key = "chartle_practice_" + window.practiceUsage.todayKey();
        return parseInt(localStorage.getItem(key) || "0");
      },
      increment: () => {
        const key = "chartle_practice_" + window.practiceUsage.todayKey();
        const n = window.practiceUsage.getCount() + 1;
        localStorage.setItem(key, String(n));
        return n;
      },
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;


// ── Seeded RNG ────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// ── Chart Data ────────────────────────────────────────────────────────────────
function generateOHLC(rng, displayBars = 80) {
  const assets = ["BTC/USD","ETH/USD","AAPL","TSLA","EUR/USD","SOL/USD","NVDA","SPY"];
  const asset = assets[Math.floor(rng() * assets.length)];
  const tf = ["1H","4H","1D"][Math.floor(rng() * 3)];
  let price = 100 + rng() * 900;
  const vol = 0.015 + rng() * 0.025;
  let trend = (rng() - 0.5) * 0.002;
  // Generate 200 warmup bars (hidden) so MA50 and MA100 are fully populated
  // across all visible candles from bar 0 on screen
  const WARMUP = 200;
  const allCandles = [];
  for (let i = 0; i < WARMUP + displayBars; i++) {
    if (rng() < 0.08) trend = (rng() - 0.5) * 0.002;
    const open = price;
    const move = (rng() - 0.48 + trend) * vol * price;
    const close = open + move;
    const high = Math.max(open, close) + rng() * vol * price * 0.5;
    const low = Math.min(open, close) - rng() * vol * price * 0.5;
    allCandles.push({ open, high, low, close, volume: 500 + rng() * 2000 });
    price = close;
  }
  // candles = full history (warmup + display), displayed = last displayBars shown on screen
  const candles = allCandles;
  const future = [];
  for (let i = 0; i < 20; i++) {
    if (rng() < 0.06) trend = (rng() - 0.5) * 0.003;
    const open = price;
    const move = (rng() - 0.48 + trend) * vol * price;
    const close = open + move;
    const high = Math.max(open, close) + rng() * vol * price * 0.5;
    const low = Math.min(open, close) - rng() * vol * price * 0.5;
    future.push({ open, high, low, close, volume: 300 + rng() * 1500 });
    price = close;
  }
  return { candles, future, asset, tf, entryPrice: candles[candles.length - 1].close, displayBars, fetchedAt: Date.now() };
}

function calcMA(candles, period) {
  return candles.map((_, i) => {
    if (i < period - 1) return null;
    const slice = candles.slice(i - period + 1, i + 1);
    return slice.reduce((s, c) => s + c.close, 0) / period;
  });
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function calcScore(direction, entryPrice, sl, tp, future) {
  let result = "timeout", exitBar = future.length, exitPrice = future[future.length - 1].close;
  const mult = direction === "long" ? 1 : -1;
  for (let i = 0; i < future.length; i++) {
    const { high, low } = future[i];
    const slHit = direction === "long" ? low <= sl : high >= sl;
    const tpHit = direction === "long" ? high >= tp : low <= tp;
    if (slHit) { result = "sl"; exitBar = i; exitPrice = sl; break; }
    if (tpHit) { result = "tp"; exitBar = i; exitPrice = tp; break; }
  }
  const finalClose = future[future.length - 1].close;
  const correctDirection = result === "tp" ? true : result === "sl" ? false : mult * (finalClose - entryPrice) > 0;
  const risk = Math.abs(entryPrice - sl);
  const reward = Math.abs(tp - entryPrice);
  const rrRatio = reward / Math.max(risk, 0.0001);
  const pnl = (exitPrice - entryPrice) * mult;
  const pnlPct = (pnl / entryPrice) * 100;
  let directionScore = result === "tp" ? 40 : result === "sl" ? 0 : correctDirection ? 28 : 5;
  let outcomeScore = result === "tp" ? 40 : result === "timeout" ? (correctDirection ? 20 : 8) : 0;
  // ── R:R score: 10pts efficiency + 10pts ratio quality ──────────────────────
  // Efficiency: how far did price move toward TP (best excursion as % of TP distance)
  const tpDist = Math.abs(tp - entryPrice);
  let bestExcursion = 0;
  for (const bar of future) {
    const towards = direction === "long"
      ? Math.max(0, bar.high - entryPrice)
      : Math.max(0, entryPrice - bar.low);
    if (towards > bestExcursion) bestExcursion = towards;
  }
  const efficiencyPct = tpDist > 0 ? Math.min(1, bestExcursion / tpDist) : 0;
  const efficiencyScore = Math.round(efficiencyPct * 10);

  // Ratio quality: 0 if RR < 1.25, else scales 0→10 from 1.25→4.0
  const ratioScore = rrRatio < 1.25 ? 0 : Math.round(Math.min((rrRatio - 1.25) / (4 - 1.25), 1) * 10);

  let rrScore = efficiencyScore + ratioScore;
  const score = Math.min(100, Math.round(directionScore + outcomeScore + rrScore));
  return { score, result, exitBar, exitPrice, pnlPct, rrRatio, correctDirection, directionScore, outcomeScore, rrScore, efficiencyScore, ratioScore };
}

// ── Canvas Chart ──────────────────────────────────────────────────────────────
const PAD = { top: 20, right: 60, bottom: 40, left: 70 };

function getChartHelpers(dataCandles, totalSlots, W, H) {
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const highs = dataCandles.map(c => c.high);
  const lows  = dataCandles.map(c => c.low);
  const lastClose = dataCandles[dataCandles.length - 1].close;

  // Natural range from candle data
  const naturalMax = Math.max(...highs);
  const naturalMin = Math.min(...lows);
  const naturalHalf = Math.max(naturalMax - lastClose, lastClose - naturalMin) * 1.08;

  // Force the range to be symmetric around lastClose so it sits at vertical midpoint
  const maxP = lastClose + naturalHalf;
  const minP = lastClose - naturalHalf;
  const range = maxP - minP;

  const xOf  = (i) => PAD.left + (i / totalSlots) * chartW + chartW / totalSlots / 2;
  const yOf  = (p) => PAD.top  + (1 - (p - minP) / range) * chartH;
  const pOf  = (y) => maxP - ((y - PAD.top) / chartH) * range;
  const barW = Math.max(2, chartW / totalSlots * 0.6);
  return { maxP, minP, range, xOf, yOf, pOf, barW, chartW, chartH, lastClose };
}

function CandleChart({ candles, future, visibleFuture, indicators, tradeLines, phase, entryPrice, drawings, activeTool, onDrawingAdd, onSetSl, onSetTp, onPreviewPrice, clearSignal, previewPrice, T }) {
  const canvasRef = useRef(null);
  const overlayRef = useRef(null);
  const containerRef = useRef(null);
  const drawState = useRef({ isDrawing: false, start: null, points: [] });
  const [size, setSize] = useState({ W: 900, H: 420 });

  // Resize observer — keep canvas pixel dims matching container
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      if (width > 0 && height > 0) setSize({ W: Math.round(width), H: Math.round(height) });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  const { W, H } = size;

  const allCandles = [...candles, ...future.slice(0, visibleFuture)];
  const TOTAL_SLOTS = 80;
  const dataCandles = allCandles.slice(-TOTAL_SLOTS);
  const { maxP, minP, range, xOf, yOf, pOf, barW, chartW, chartH } = getChartHelpers(dataCandles, TOTAL_SLOTS, W, H);

  // ── Main canvas render ────────────────────────────────────────────────────
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = T.canvasBg;
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = T.gridLine;
    ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
      const y = PAD.top + (i / 5) * chartH;
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
      const price = maxP - (i / 5) * range;
      ctx.fillStyle = T.priceLabel;
      ctx.font = T.labelFont;
      ctx.textAlign = "right";
      ctx.fillText(price.toFixed(2), PAD.left - 6, y + 4);
    }
    for (let i = 0; i < TOTAL_SLOTS; i += 10) {
      const x = xOf(i);
      ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
    }

    // Volume
    const maxVol = Math.max(...dataCandles.map(c => c.volume || 0));
    dataCandles.forEach((c, i) => {
      const x = xOf(i);
      const volH = ((c.volume || 0) / maxVol) * 50;
      const isFut = i >= candles.slice(-TOTAL_SLOTS).length;
      ctx.fillStyle = c.close >= c.open ? T.volBull(isFut) : T.volBear(isFut);
      ctx.fillRect(x - barW / 2, H - PAD.bottom - volH, barW, volH);
    });

    // MAs — compute on full history so warmup candles seed the calculation,
    // then map only the visible slice onto screen x-positions
    const allFull = [...candles, ...future.slice(0, visibleFuture)];
    const visibleCount = dataCandles.length;
    const maConfigs = [
      { key: "ma20", period: 20, color: "#f59e0b" },
      { key: "ma50", period: 50, color: "#818cf8" },
      { key: "ma100", period: 100, color: "#f472b6" },
    ];
    maConfigs.forEach(({ key, period, color }) => {
      if (!indicators[key]) return;
      const maFull = calcMA(allFull, period);
      // Take the last visibleCount values — these correspond to the displayed candles
      const ma = maFull.slice(allFull.length - visibleCount);
      ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      let started = false;
      ma.forEach((v, i) => {
        if (v === null) return;
        if (!started) { ctx.moveTo(xOf(i), yOf(v)); started = true; }
        else ctx.lineTo(xOf(i), yOf(v));
      });
      ctx.stroke();
    });

    // Candles
    dataCandles.forEach((c, i) => {
      const x = xOf(i);
      const isFut = i >= (dataCandles.length - visibleFuture);
      const bull = c.close >= c.open;
      const alpha = isFut ? 0.7 : 1;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = bull ? T.bull : T.bear;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, yOf(c.high)); ctx.lineTo(x, yOf(c.low)); ctx.stroke();
      const bodyTop = yOf(Math.max(c.open, c.close));
      const bodyBot = yOf(Math.min(c.open, c.close));
      ctx.fillStyle = bull ? T.bull : T.bear;
      ctx.fillRect(x - barW / 2, bodyTop, barW, Math.max(1, bodyBot - bodyTop));
      ctx.globalAlpha = 1;
    });

    // Committed drawings
    drawings.forEach(d => renderDrawing(ctx, d, null, xOf, yOf, pOf));

    // Trade lines
    if (tradeLines) {
      const { sl, tp } = tradeLines;
      ctx.font = T.labelFont; ctx.textAlign = "left";
      if (entryPrice) {
        ctx.setLineDash([4, 4]); ctx.strokeStyle = T.entryLine; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(PAD.left, yOf(entryPrice)); ctx.lineTo(W - PAD.right, yOf(entryPrice)); ctx.stroke();
        ctx.fillStyle = T.entryFill;
        ctx.fillText("ENTRY " + entryPrice.toFixed(2), W - PAD.right + 4, yOf(entryPrice) + 4);
      }
      if (sl) {
        // fade existing SL when a new SL is being previewed
        ctx.globalAlpha = previewPrice?.tool === "set-sl" ? 0.4 : 1;
        ctx.setLineDash([]); ctx.strokeStyle = "rgba(255,80,80,0.8)"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(PAD.left, yOf(sl)); ctx.lineTo(W - PAD.right, yOf(sl)); ctx.stroke();
        ctx.fillStyle = "rgba(255,80,80,0.9)";
        ctx.fillText("SL " + sl.toFixed(2), W - PAD.right + 4, yOf(sl) + 4);
        ctx.globalAlpha = 1;
      }
      if (tp) {
        // fade existing TP when a new TP is being previewed
        ctx.globalAlpha = previewPrice?.tool === "set-tp" ? 0.4 : 1;
        ctx.strokeStyle = T.green; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(PAD.left, yOf(tp)); ctx.lineTo(W - PAD.right, yOf(tp)); ctx.stroke();
        ctx.fillStyle = T.green;
        ctx.fillText("TP " + tp.toFixed(2), W - PAD.right + 4, yOf(tp) + 4);
        ctx.globalAlpha = 1;
      }
      ctx.setLineDash([]);
    }

    // Price tag — use last real candle (dataCandles), not the padded array
    const lastClose = dataCandles[dataCandles.length - 1].close;
    const yLast = yOf(lastClose);
    ctx.fillStyle = T.priceTagBg;
    ctx.fillRect(W - PAD.right + 2, yLast - 9, 56, 18);
    ctx.strokeStyle = T.priceTagBdr; ctx.lineWidth = 1;
    ctx.strokeRect(W - PAD.right + 2, yLast - 9, 56, 18);
    ctx.fillStyle = T.priceTagTxt;
    ctx.font = T.boldFont; ctx.textAlign = "left";
    ctx.fillText(lastClose.toFixed(2), W - PAD.right + 5, yLast + 4);

  }, [candles, future, visibleFuture, indicators, tradeLines, phase, entryPrice, drawings, previewPrice, W, H, T]);

  // ── Overlay: in-progress drawing ─────────────────────────────────────────
  function renderDrawing(ctx, drawing, preview, xOf, yOf, pOf) {
    ctx.save();
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);

    if (drawing.type === "hline") {
      const y = yOf(drawing.price);
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
      ctx.fillStyle = "#38bdf8"; ctx.font = T.labelFont; ctx.textAlign = "left";
      ctx.fillText(drawing.price.toFixed(2), W - PAD.right + 4, y + 4);
    } else if (drawing.type === "set-sl") {
      const y = yOf(drawing.price);
      ctx.setLineDash([5, 3]);
      ctx.strokeStyle = "rgba(255,80,80,0.9)"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
      ctx.setLineDash([]);
      // Label badge
      ctx.fillStyle = "rgba(255,80,80,0.9)";
      ctx.fillRect(PAD.left, y - 9, 28, 18);
      ctx.fillStyle = "#000"; ctx.font = "bold 9px 'JetBrains Mono', monospace"; ctx.textAlign = "center";
      ctx.fillText("SL", PAD.left + 14, y + 4);
      ctx.fillStyle = "rgba(255,80,80,0.9)"; ctx.textAlign = "left";
      ctx.font = T.labelFont;
      ctx.fillText(drawing.price.toFixed(2), W - PAD.right + 4, y + 4);
    } else if (drawing.type === "set-tp") {
      const y = yOf(drawing.price);
      ctx.setLineDash([5, 3]);
      ctx.strokeStyle = T.green; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
      ctx.setLineDash([]);
      // Label badge
      ctx.fillStyle = T.green;
      ctx.fillRect(PAD.left, y - 9, 28, 18);
      ctx.fillStyle = "#000"; ctx.font = "bold 9px 'JetBrains Mono', monospace"; ctx.textAlign = "center";
      ctx.fillText("TP", PAD.left + 14, y + 4);
      ctx.fillStyle = T.green; ctx.textAlign = "left";
      ctx.font = T.labelFont;
      ctx.fillText(drawing.price.toFixed(2), W - PAD.right + 4, y + 4);
    } else if (drawing.type === "trendline") {
      const pts = preview ? [...drawing.points, preview] : drawing.points;
      if (pts.length >= 2) {
        ctx.beginPath();
        ctx.moveTo(pts[0].x, yOf(pts[0].p));
        ctx.lineTo(pts[1].x, yOf(pts[1].p));
        ctx.stroke();
        // extend slightly
        const dx = pts[1].x - pts[0].x;
        const dp = pts[1].p - pts[0].p;
        if (dx !== 0) {
          const ext = 40;
          ctx.strokeStyle = "rgba(56,189,248,0.3)";
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.moveTo(pts[1].x, yOf(pts[1].p));
          ctx.lineTo(pts[1].x + ext, yOf(pts[1].p + (dp / dx) * ext));
          ctx.stroke();
        }
      }
      pts.forEach(pt => {
        ctx.fillStyle = "#38bdf8"; ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(pt.x, yOf(pt.p), 3, 0, Math.PI * 2); ctx.fill();
      });
    } else if (drawing.type === "multitouch") {
      const pts = preview ? [...drawing.points, preview] : drawing.points;
      if (pts.length >= 1) {
        ctx.setLineDash([]);
        // Draw connecting line through all points in order
        if (pts.length >= 2) {
          ctx.strokeStyle = "#38bdf8";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, yOf(pts[0].p));
          for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x, yOf(pts[i].p));
          }
          ctx.stroke();
        }
        // Dot + price label at each clicked point
        pts.forEach((pt, idx) => {
          ctx.fillStyle = "#38bdf8";
          ctx.beginPath(); ctx.arc(pt.x, yOf(pt.p), 4, 0, Math.PI * 2); ctx.fill();
          // Small price label
          ctx.fillStyle = "rgba(56,189,248,0.8)";
          ctx.font = T.labelFont;
          ctx.textAlign = "left";
          ctx.fillText(pt.p.toFixed(2), pt.x + 7, yOf(pt.p) - 4);
        });
      }
    }
    ctx.restore();
  }

  // Overlay canvas for live drawing
  useEffect(() => {
    const overlay = overlayRef.current;
    if (!overlay) return;
    overlay.width = W;
    overlay.height = H;
    const ctx = overlay.getContext("2d");
    ctx.clearRect(0, 0, W, H);
    const ds = drawState.current;
    // Only skip overlay rendering when there's no drawing activity, no preview and no points
    if (!ds.isDrawing && !ds.preview && ds.points.length === 0) return;
    // Prefer explicit preview tool (stored on drawState) so preview persists
    const previewTool = ds.previewTool || activeTool;
    if (previewTool === "hline" && ds.preview) {
      renderDrawing(ctx, { type: "hline", price: ds.preview.p }, null, xOf, yOf, pOf);
    } else if (previewTool === "set-sl" && ds.preview) {
      renderDrawing(ctx, { type: "set-sl", price: ds.preview.p }, null, xOf, yOf, pOf);
    } else if (previewTool === "set-tp" && ds.preview) {
      renderDrawing(ctx, { type: "set-tp", price: ds.preview.p }, null, xOf, yOf, pOf);
    } else if (previewTool === "trendline") {
      renderDrawing(ctx, { type: "trendline", points: ds.points }, ds.preview, xOf, yOf, pOf);
    } else if (previewTool === "multitouch") {
      renderDrawing(ctx, { type: "multitouch", points: ds.points }, ds.preview, xOf, yOf, pOf);
    }
  });

  // Clear overlay / draw state when parent issues a clear signal
  useEffect(() => {
    if (typeof clearSignal === 'undefined') return;
    const ds = drawState.current;
    ds.isDrawing = false;
    ds.points = [];
    ds.preview = null;
    ds.previewTool = null;
    const overlay = overlayRef.current;
    if (overlay) {
      const ctx = overlay.getContext('2d');
      ctx.clearRect(0, 0, overlay.width || W, overlay.height || H);
    }
  }, [clearSignal]);

  const getCanvasPos = (e) => {
    const rect = overlayRef.current.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top) * scaleY;
    return { x: cx, y: cy, p: pOf(cy) };
  };

  const handleMouseDown = (e) => {
    if (!activeTool) return;
    const pos = getCanvasPos(e);
    const ds = drawState.current;
    ds.isDrawing = true;
    ds.preview = pos;
    ds.previewTool = activeTool;

    if (activeTool === "hline") {
      onDrawingAdd({ type: "hline", price: pos.p });
      ds.isDrawing = false;
    } else if (activeTool === "set-sl") {
      onSetSl(pos.p);
      ds.isDrawing = false;
      ds.preview = null;
      ds.previewTool = null;
      const overlay = overlayRef.current;
      if (overlay) overlay.getContext('2d').clearRect(0, 0, W, H);
    } else if (activeTool === "set-tp") {
      onSetTp(pos.p);
      ds.isDrawing = false;
      ds.preview = null;
      ds.previewTool = null;
      const overlay = overlayRef.current;
      if (overlay) overlay.getContext('2d').clearRect(0, 0, W, H);
    } else if (activeTool === "trendline") {
      ds.points.push(pos);
      if (ds.points.length >= 2) {
        onDrawingAdd({ type: "trendline", points: [...ds.points] });
        ds.points = []; ds.isDrawing = false; ds.preview = null;
      }
    } else if (activeTool === "multitouch") {
      // Snap radius = one full candle spacing in pixels (chartW / number of visible candles)
      const candleSpacing = chartW / TOTAL_SLOTS;
      const snapRadius = candleSpacing; // one candle width in each direction
      const last = ds.points[ds.points.length - 1];
      const dx = last ? Math.abs(pos.x - last.x) : Infinity;
      const dy = last ? Math.abs(pos.y - last.y) : Infinity;
      if (last && dx < snapRadius && dy < snapRadius && ds.points.length >= 2) {
        // Clicked close enough to last point — commit the drawing
        onDrawingAdd({ type: "multitouch", points: [...ds.points] });
        ds.points = []; ds.isDrawing = false; ds.preview = null;
        const overlay = overlayRef.current;
        if (overlay) overlay.getContext("2d").clearRect(0, 0, W, H);
      } else {
        ds.points.push(pos);
      }
    }
  };

  const handleMouseMove = (e) => {
    if (!activeTool) return;
    const pos = getCanvasPos(e);
    drawState.current.preview = pos;
    drawState.current.previewTool = activeTool;
    // Fire preview price up to parent for live R:R display
    if ((activeTool === "set-sl" || activeTool === "set-tp") && onPreviewPrice) {
      onPreviewPrice({ tool: activeTool, price: pos.p });
    }
    // trigger overlay re-render
    const overlay = overlayRef.current;
    if (!overlay) return;
    const ctx = overlay.getContext("2d");
    ctx.clearRect(0, 0, W, H);
    const ds = drawState.current;
    if (activeTool === "hline") {
      renderDrawing(ctx, { type: "hline", price: pos.p }, null, xOf, yOf, pOf);
    } else if (activeTool === "set-sl") {
      renderDrawing(ctx, { type: "set-sl", price: pos.p }, null, xOf, yOf, pOf);
    } else if (activeTool === "set-tp") {
      renderDrawing(ctx, { type: "set-tp", price: pos.p }, null, xOf, yOf, pOf);
    } else if (activeTool === "trendline" && ds.points.length > 0) {
      renderDrawing(ctx, { type: "trendline", points: ds.points }, pos, xOf, yOf, pOf);
    } else if (activeTool === "multitouch" && ds.points.length > 0) {
      renderDrawing(ctx, { type: "multitouch", points: ds.points }, pos, xOf, yOf, pOf);
    }
  };

  const handleDoubleClick = (e) => {
    // Finishing is now handled by proximity snap in handleMouseDown
  };

  const cursor = activeTool ? "crosshair" : "default";

  return (
    <div ref={containerRef} style={{ position: "relative", width: "100%", height: "100%" }}>
      <canvas ref={canvasRef}
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", display: "block" }} />
      <canvas ref={overlayRef}
        onMouseDown={handleMouseDown}
        onMouseMove={handleMouseMove}
        onMouseLeave={() => { if (onPreviewPrice) onPreviewPrice(null); }}
        onDoubleClick={handleDoubleClick}
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", cursor }} />
    </div>
  );
}

function fmtDate(seed) {
  const y = Math.floor(seed / 10000);
  const m = String(Math.floor((seed % 10000) / 100)).padStart(2, "0");
  const d = String(seed % 100).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

// ── Admin Panel ──────────────────────────────────────────────────────────────
function AdminPanel({ T, L }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [msg, setMsg] = useState(null);

  const search = async () => {
    if (!query.trim()) return;
    setSearching(true);
    setMsg(null);
    try {
      const data = await window.apiFetch(`/api/admin/users?q=${encodeURIComponent(query.trim())}`);
      setResults(data);
      if (data.length === 0) setMsg({ type: "info", text: L.adminNoResults });
    } catch (e) {
      setMsg({ type: "err", text: e.message });
    }
    setSearching(false);
  };

  const deleteUser = async (user) => {
    if (!window.confirm(`${L.adminConfirmDelete} ${user.username} (${user.email})?`)) return;
    try {
      await window.apiFetch(`/api/admin/users/${user.id}`, { method: "DELETE" });
      setResults(prev => prev.filter(u => u.id !== user.id));
      setMsg({ type: "ok", text: `${user.email} ${L.adminDeleted}` });
    } catch (e) {
      setMsg({ type: "err", text: e.message });
    }
  };

  const cancelSub = async (user) => {
    if (!window.confirm(`${L.adminConfirmCancel} ${user.username}?`)) return;
    try {
      await window.apiFetch(`/api/admin/users/${user.id}/cancel-subscription`, { method: "POST" });
      setResults(prev => prev.map(u => u.id === user.id ? { ...u, subscription: { ...u.subscription, status: "cancelled" } } : u));
      setMsg({ type: "ok", text: `${user.email} ${L.adminCancelled}` });
    } catch (e) {
      setMsg({ type: "err", text: e.message });
    }
  };

  const fmtDate = (ts) => {
    if (!ts) return "—";
    return new Date(ts).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });

    background: T.surfaceMed, border: `1px solid ${T.borderMed}`,

    padding: "5px 12px", borderRadius: 5, fontSize: 10, cursor: "pointer",
    letterSpacing: 1, fontWeight: 700, border: `1px solid ${color}30`,
    background: bg || `${color}12`, color,
    fontFamily: "'JetBrains Mono', monospace",
  });

  const resetDaily = async () => {
    if (!window.confirm(L.adminConfirmReset)) return;

      const res = await window.apiFetch("/api/admin/reset-daily", { method: "POST" });
      setMsg({ type: "ok", text: res.message });
    } catch (e) {
      setMsg({ type: "err", text: e.message });
    }

  return (
    <div style={{ flex: 1, padding: 24, overflow: "auto", background: T.pageBg, color: T.text }}>

function JournalPage({ seed, scoreData, direction, sl, tp, entryPrice, asset, tf, T, L, user, onLogin }) {
  const [notes, setNotes] = useState("");
  const [saved, setSaved] = useState(false);
  const [realEntries, setRealEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filters, setFilters] = useState({ direction: "all", asset: "all", tf: "all", date: "" });
  const [showFilters, setShowFilters] = useState(false);

  useEffect(() => {
    async function load() {
      if (!user) { setLoading(false); return; }
      try {
        // Load current entry's notes
        const current = await window.apiFetch(`/api/journal/${seed}`);
        if (current) setNotes(current.notes || "");
      } catch {}
      try {
        // Load all entries
        const entries = await window.apiFetch("/api/journal");
        if (Array.isArray(entries)) setRealEntries(entries);
      } catch {}
      setLoading(false);
    }
    load();
  }, [seed, user]);

  const handleSave = async () => {
    if (!user) { onLogin(); return; }
    const entry = {
      seed, notes, direction, sl, tp, entryPrice, asset, tf,
      score: scoreData?.score ?? null,
      result: scoreData?.result ?? null,
      grade: scoreData ? (scoreData.score >= 85 ? "S" : scoreData.score >= 70 ? "A" : scoreData.score >= 55 ? "B" : scoreData.score >= 40 ? "C" : "D") : null,
      savedAt: Date.now(),
    };
    try {
      await window.apiFetch("/api/journal", {
        method: "POST",
        body: JSON.stringify(entry),
      });
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
      setRealEntries(prev => [entry, ...prev.filter(e => e.seed !== seed)]);

  const gradeColor = (g) => ({ S: "#ffd700", A: T.green, B: "#60a5fa", C: "#f59e0b", D: "#ff5050" })[g] || T.textMuted;

  // Merge real + dummy, deduplicate by seed (real takes priority)
  const realSeeds = new Set(realEntries.map(e => e.seed));
  const allEntries = [...realEntries, ...DUMMY_ENTRIES.filter(d => !realSeeds.has(d.seed))].sort((a,b) => b.seed - a.seed);

  // Derive unique filter options

  const allTfs    = [...new Set(allEntries.map(e => e.tf).filter(Boolean))];

  // Apply filters

    if (filters.direction !== "all" && e.direction !== filters.direction) return false;
    if (filters.asset !== "all" && e.asset !== filters.asset) return false;
    if (filters.tf !== "all" && e.tf !== filters.tf) return false;

              </div>
            );
          })}
        </div>
      </div>
    </div>
  );

// ── Dummy data generator for Consensus preview ───────────────────────────────
function generateDummyPool(entryPrice) {
  const base = entryPrice || 500;
  const pool = [];
  const rng = mulberry32(42);
  for (let i = 0; i < 48; i++) {
    const isLong = rng() > 0.38; // ~62% long
    const slDist = base * (0.01 + rng() * 0.025);
    const tpDist = slDist * (1.5 + rng() * 3);
    const sl = isLong ? base - slDist : base + slDist;
    const tp = isLong ? base + tpDist : base - tpDist;
    const score = Math.round(20 + rng() * 75);
    const results = ["tp","tp","tp","sl","sl","timeout"];
    const result = results[Math.floor(rng() * results.length)];
    pool.push({ direction: isLong ? "long" : "short", sl, tp, score, result });
  }
  return pool;
}

// ── Consensus Page ────────────────────────────────────────────────────────────
function ConsensusPage({ seed, scoreData, direction, sl, tp, entryPrice, T, L, user }) {
  const [submitted, setSubmitted] = useState(false);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  // Load the pool — submission happens in handleTrade
  useEffect(() => {
    setLoading(true);
    setError(null);
    fetch(window.API_BASE + `/api/consensus/${seed}`, {
      headers: window.auth.getToken() ? { "Authorization": "Bearer " + window.auth.getToken() } : {},
    })
      .then(r => r.json())
      .then(res => {
        setData(res.pool || []);
        setSubmitted(res.hasVoted || false);
      })
      .catch(e => {
        console.error("[Consensus] Load failed:", e);
        setError(e.message);
      })
      .finally(() => setLoading(false));
  }, [seed, scoreData]);

  // Use real data if available, otherwise show dummy preview
  const isDummy = !loading && (!data || data.length === 0);
  const rawPool = isDummy ? generateDummyPool(entryPrice) : (data || []);

  // Trimmed mean: discard bottom and top 10%
  function trimmedMean(arr) {
    if (arr.length === 0) return null;
    const sorted = [...arr].sort((a, b) => a - b);
    const cut = Math.floor(sorted.length * 0.1);
    const trimmed = sorted.slice(cut, sorted.length - cut || undefined);
    return trimmed.length ? trimmed.reduce((s, v) => s + v, 0) / trimmed.length : null;
  }

  function trimmedPct(arr, val) {
    // what percentile is val in the trimmed distribution
    if (!arr.length) return null;
    const sorted = [...arr].sort((a, b) => a - b);
    const cut = Math.floor(sorted.length * 0.1);
    const trimmed = sorted.slice(cut, sorted.length - cut || undefined);
    if (!trimmed.length) return null;
    const below = trimmed.filter(v => v <= val).length;
    return Math.round((below / trimmed.length) * 100);
  }

  const pool = rawPool;
  const n = pool.length;
  const longs = pool.filter(d => d.direction === "long").length;
  const shorts = pool.filter(d => d.direction === "short").length;
  const longPct = n ? Math.round((longs / n) * 100) : null;
  const shortPct = n ? Math.round((shorts / n) * 100) : null;
  const avgSl = trimmedMean(pool.map(d => d.sl).filter(Boolean));
  const avgTp = trimmedMean(pool.map(d => d.tp).filter(Boolean));
  const avgScore = trimmedMean(pool.map(d => d.score).filter(v => v !== null));
  const tpHits = n ? Math.round((pool.filter(d => d.result === "tp").length / n) * 100) : null;

  const Stat = ({ label, value, sub, color }) => (
    <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "18px 20px" }}>
      <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 3, marginBottom: 8 }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, color: color || T.text, fontFamily: "'Space Grotesk', sans-serif", lineHeight: 1 }}>{value ?? "—"}</div>
      {sub && <div style={{ fontSize: 10, color: T.textMuted, marginTop: 5 }}>{sub}</div>}
    </div>
  );

  const Bar = ({ label, pct, color }) => (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: T.textMuted }}>{label}</span>
        <span style={{ fontSize: 11, fontWeight: 700, color, fontFamily: "'Space Grotesk', sans-serif" }}>{pct ?? "—"}{pct != null ? "%" : ""}</span>
      </div>
      <div style={{ height: 6, background: T.border, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct || 0}%`, background: color, borderRadius: 3, transition: "width 0.8s ease" }} />
      </div>
    </div>
  );

  return (
    <div style={{ flex: 1, padding: "24px", overflow: "auto", background: T.pageBg, color: T.text }}>
      {/* Header row */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: 3, color: T.textMuted }}>{L.consensusHeader} · {fmtDate(seed)}</div>
          <div style={{ fontSize: 20, fontWeight: 700, color: T.text, fontFamily: "'Space Grotesk', sans-serif", marginTop: 4 }}>{L.howTraded}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: T.textMuted }}>{isDummy ? L.dummyTraders : L.tradersLabel(n)}{L.trimmedNote}</div>
          {isDummy && <div style={{ fontSize: 9, color: "#f59e0b", letterSpacing: 1, marginTop: 3 }}>{L.previewNote}</div>}
        </div>
      </div>

      {loading && <div style={{ fontSize: 12, color: T.textMuted }}>{L.loadingTxt}</div>}

      {/* Dummy mode banner */}
      {!loading && isDummy && (
        <div style={{ background: "rgba(245,158,11,0.07)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 8, padding: "10px 16px", marginBottom: 20, fontSize: 11, color: "rgba(245,158,11,0.8)", letterSpacing: 0.5 }}>
          {L.dummyBanner}
        </div>
      )}

      {!loading && (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

          {/* Direction split */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "18px 20px" }}>
            <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 3, marginBottom: 16 }}>{L.dirSplit}</div>
            {/* Visual long/short split bar */}
            <div style={{ height: 28, borderRadius: 6, overflow: "hidden", display: "flex", marginBottom: 12 }}>
              <div style={{ width: `${longPct}%`, background: T.greenLong, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#000", fontFamily: "'Space Grotesk', sans-serif", transition: "width 0.8s ease" }}>
                {longPct >= 15 ? `▲ ${longPct}%` : ""}
              </div>
              <div style={{ flex: 1, background: "linear-gradient(90deg, #ff5050, #cc3333)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#fff", fontFamily: "'Space Grotesk', sans-serif" }}>
                {shortPct >= 15 ? `▼ ${shortPct}%` : ""}
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 10, color: T.green }}>{L.longLabel(longPct, longs)}</span>
              <span style={{ fontSize: 10, color: "#ff5050" }}>{L.shortLabel(shortPct, shorts)}</span>
            </div>
          </div>

          {/* Key stats grid and labels */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
            <Stat label={L.avgSl} value={avgSl != null ? avgSl.toFixed(2) : null} sub={L.trimmedMean} color="#ff8080" />
            <Stat label={L.avgTp} value={avgTp != null ? avgTp.toFixed(2) : null} sub={L.trimmedMean} color={T.green} />
            <Stat label={L.avgScore} value={avgScore != null ? Math.round(avgScore) + "/100" : null} sub={`${L.globally}`} color="#60a5fa" />
            <Stat label={L.tpHitRate} value={tpHits != null ? tpHits + "%" : null} sub={L.ofAllTrades} color="#f59e0b" />
          </div>

          {/* Score distribution bar chart */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "18px 20px" }}>
            <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 3, marginBottom: 14 }}>{L.scoreDist}</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 60 }}>
              {Array.from({ length: 10 }, (_, i) => {
                const lo = i * 10, hi = lo + 10;
                const count = pool.filter(d => d.score >= lo && d.score < hi + (i === 9 ? 1 : 0)).length;
                const maxCount = Math.max(...Array.from({ length: 10 }, (_, j) => pool.filter(d => d.score >= j*10 && d.score < j*10+10+(j===9?1:0)).length));
                const h = maxCount ? Math.round((count / maxCount) * 56) : 0;
                const grade = hi <= 40 ? "#ff5050" : hi <= 60 ? "#f59e0b" : hi <= 80 ? "#60a5fa" : T.green;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                    <div style={{ width: "100%", height: h, background: grade, borderRadius: "3px 3px 0 0", opacity: 0.7, minHeight: count > 0 ? 3 : 0 }} />
                    <span style={{ fontSize: 8, color: T.textLabel }}>{lo}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Your result vs community */}
          {scoreData && sl && tp && !isDummy && (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "18px 20px" }}>
              <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 3, marginBottom: 14 }}>{L.yourVsCommunity}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
                {[
                  { label: L.yourSl, yours: sl.toFixed ? sl.toFixed(2) : sl, avg: avgSl?.toFixed(2), arr: pool.map(d=>d.sl).filter(Boolean), color: "#ff8080" },
                  { label: L.yourTp, yours: tp.toFixed ? tp.toFixed(2) : tp, avg: avgTp?.toFixed(2), arr: pool.map(d=>d.tp).filter(Boolean), color: T.green },
                  { label: L.yourScore, yours: scoreData.score, avg: avgScore ? Math.round(avgScore) : null, arr: pool.map(d=>d.score).filter(v=>v!==null), color: "#60a5fa" },
                ].map(({ label, yours, avg, arr, color }) => {
                  const pctile = trimmedPct(arr, parseFloat(yours));
                  return (
                    <div key={label}>
                      <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 2, marginBottom: 6 }}>{label}</div>
                      <div style={{ fontSize: 20, fontWeight: 700, color, fontFamily: "'Space Grotesk', sans-serif" }}>{yours}</div>
                      <div style={{ fontSize: 10, color: T.textSub, marginTop: 3 }}>
                        {L.avgLabel(avg ?? "—")} · {L.topLabel(pctile != null ? (100 - pctile) + "%" : "—")}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}



// ── Auth Modal ─────────────────────────────────────────────────────────────────
function AuthModal({ T, L, onSuccess, onClose }) {
  const [mode, setMode] = React.useState("login"); // login | signup | forgot
  const [email, setEmail] = React.useState("");
  const [username, setUsername] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [error, setError] = React.useState("");
  const [info, setInfo] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  const inp = {
    width: "100%", padding: "10px 14px", borderRadius: 6,
    background: T.surfaceMed, border: `1px solid ${T.borderMed}`,
    color: T.text, fontSize: 13, outline: "none",
    fontFamily: "'JetBrains Mono', monospace",
  };
  const btn = (col) => ({
    width: "100%", padding: "12px", borderRadius: 6, border: "none",
    background: col || T.greenGrad, color: col ? T.text : "#000",
    fontSize: 12, fontWeight: 700, letterSpacing: 1, cursor: "pointer",
    fontFamily: "'JetBrains Mono', monospace", marginTop: 4,
  });

  const submit = async () => {
    setError(""); setInfo(""); setLoading(true);
    try {
      if (mode === "forgot") {
        await window.apiFetch("/api/auth/forgot-password", {
          method: "POST", body: JSON.stringify({ email }),
        });
        setInfo("If that email exists, a reset link has been sent.");
        setLoading(false); return;
      }
      const endpoint = mode === "login" ? "/api/auth/login" : "/api/auth/signup";
      const body = mode === "login"
        ? { email, password }
        : { email, password, username };
      const data = await window.apiFetch(endpoint, {
        method: "POST", body: JSON.stringify(body),
      });
      window.auth.setToken(data.token);
      window.auth.setUser(data.user);
      onSuccess(data.user);
    } catch(e) {
      setError(e.message || L.somethingWrong);
    }
    setLoading(false);
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000,
      background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)",
      display: "flex", alignItems: "center", justifyContent: "center",
    }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{
        background: T.pageBg, border: `1px solid ${T.borderMed}`,
        borderRadius: 14, padding: "32px 28px", width: 360,
        animation: "fadeIn 0.18s ease",
      }}>
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 20, fontWeight: 900, fontFamily: "'Space Grotesk', sans-serif", letterSpacing: -1, color: T.text }}>
            CHAR<span style={{ color: T.green }}>TLE</span>
          </div>
          <div style={{ fontSize: 11, color: T.textMuted, letterSpacing: 2, marginTop: 4 }}>
            {mode === "login" ? L.signIn : mode === "signup" ? L.createAccount : L.resetPassword}
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {mode === "signup" && (
            <input style={inp} placeholder={L.usernamePlaceholder} value={username}
              onChange={e => setUsername(e.target.value)} />
          )}
          <input style={inp} placeholder={L.emailPlaceholder} type="email" value={email}
            onChange={e => setEmail(e.target.value)} />
          {mode !== "forgot" && (
            <input style={inp} placeholder={L.passwordPlaceholder} type="password" value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()} />
          )}
          {error && <div style={{ fontSize: 11, color: "#ff5050", padding: "6px 0" }}>{error}</div>}
          {info  && <div style={{ fontSize: 11, color: T.green, padding: "6px 0" }}>{info}</div>}
          <button style={btn()} onClick={submit} disabled={loading}>
            {loading ? "..." : mode === "login" ? L.signIn : mode === "signup" ? L.createAccount : L.sendResetLink}
          </button>
        </div>

        <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 8, alignItems: "center" }}>
          {mode === "login" && <>
            <button onClick={() => { setMode("signup"); setError(""); setInfo(""); }}
              style={{ background: "none", border: "none", color: T.textMuted, fontSize: 11, cursor: "pointer", letterSpacing: 1 }}>
              {L.noAccount}
            </button>
            <button onClick={() => { setMode("forgot"); setError(""); setInfo(""); }}
              style={{ background: "none", border: "none", color: T.textDim, fontSize: 10, cursor: "pointer" }}>
              {L.forgotPassword}
            </button>
          </>}
          {mode !== "login" && (
            <button onClick={() => { setMode("login"); setError(""); setInfo(""); }}
              style={{ background: "none", border: "none", color: T.textMuted, fontSize: 11, cursor: "pointer", letterSpacing: 1 }}>
              {L.backToSignIn}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Account Dropdown ────────────────────────────────────────────────────────────
function AccountButton({ T, L, user, onLogin, onLogout, onManage }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef();

  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  if (!user) {
    return (
      <button onClick={onLogin} style={{
        height: 34, padding: "0 14px", borderRadius: 8,
        border: `1px solid ${T.greenBdr}`, background: T.greenDim,
        color: T.green, cursor: "pointer", fontSize: 11, fontWeight: 700,
        letterSpacing: 1, fontFamily: "'JetBrains Mono', monospace",
        display: "flex", alignItems: "center", gap: 6,
      }}>
        <span>⬡</span> {L.signInBtn}
      </button>
    );
  }

  const isPaid = user.subscription?.status === "active";

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen(o => !o)} style={{
        height: 34, padding: "0 12px", borderRadius: 8,
        border: `1px solid ${T.borderMed}`, background: T.surfaceMed,
        color: T.text, cursor: "pointer", fontSize: 11,
        fontFamily: "'JetBrains Mono', monospace",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <div style={{
          width: 22, height: 22, borderRadius: "50%",
          background: isPaid ? T.greenGrad : T.surfaceHov,
          border: `2px solid ${isPaid ? T.green : T.borderMed}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 10, fontWeight: 700, color: isPaid ? "#000" : T.textMuted,
        }}>
          {user.username?.[0]?.toUpperCase() || "?"}
        </div>
        <span style={{ maxWidth: 80, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
          {user.username}
        </span>
        <span style={{ fontSize: 8, color: T.textDim }}>{open ? "▲" : "▼"}</span>
      </button>

      {open && (
        <div style={{
          position: "absolute", right: 0, top: 40, width: 220,
          background: T.tooltipBg, border: `1px solid ${T.tooltipBdr}`,
          borderRadius: 10, padding: "8px 0", zIndex: 200,
          boxShadow: "0 8px 32px rgba(0,0,0,0.4)", animation: "fadeIn 0.12s ease",
        }}>
          {/* User info */}
          <div style={{ padding: "10px 16px 10px", borderBottom: `1px solid ${T.borderFaint}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>{user.username}</div>
            <div style={{ fontSize: 10, color: T.textMuted, marginTop: 2 }}>{user.email}</div>
            <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{
                fontSize: 9, padding: "3px 8px", borderRadius: 4, letterSpacing: 1, fontWeight: 700,
                background: isPaid ? T.greenDim : T.surfaceMed,
                border: `1px solid ${isPaid ? T.greenBdr : T.borderFaint}`,
                color: isPaid ? T.green : T.textDim,
              }}>
                {isPaid ? "⭐ PRO" : "FREE"}
              </div>
              {!user.verified && (
                <div style={{ fontSize: 9, color: "#f59e0b", letterSpacing: 1 }}>{L.unverified}</div>
              )}
            </div>
          </div>

          {/* Menu items */}
          {[
            !isPaid && { label: L.upgradePro, action: () => onManage("subscription"), highlight: true },
            isPaid  && { label: L.manageSubscription, action: () => onManage("subscription") },
            { label: L.accountSettings, action: () => { setOpen(false); onManage("settings"); } },
            { label: "—", divider: true },
            { label: L.signOut, action: () => { setOpen(false); onLogout(); }, danger: true },
          ].filter(Boolean).map((item, i) => item.divider
            ? <div key={i} style={{ height: 1, background: T.borderFaint, margin: "4px 0" }} />
            : (
              <button key={i} onClick={() => { if (!item.divider) { item.action(); setOpen(false); } }}
                style={{
                  width: "100%", padding: "9px 16px", background: "none", border: "none",
                  textAlign: "left", cursor: "pointer", fontSize: 11,
                  color: item.danger ? "#ff5050" : item.highlight ? T.green : T.textMuted,
                  fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5,
                  fontWeight: item.highlight ? 700 : 400,
                }}>
                {item.label}
              </button>
            )
          )}
        </div>
      )}
    </div>
  );
}

// ── Account Settings Modal ──────────────────────────────────────────────────────
function AccountSettingsModal({ T, L, user, onClose, onUserUpdate }) {
  const [tab, setTab] = React.useState("profile");
  const [username, setUsername] = React.useState(user.username || "");
  const [currentPw, setCurrentPw] = React.useState("");
  const [newPw, setNewPw] = React.useState("");
  const [deletePw, setDeletePw] = React.useState("");
  const [msg, setMsg] = React.useState({ type: "", text: "" });
  const [loading, setLoading] = React.useState(false);

  const inp = {
    width: "100%", padding: "9px 12px", borderRadius: 6,
    background: T.surfaceMed, border: `1px solid ${T.borderMed}`,
    color: T.text, fontSize: 12, outline: "none",
    fontFamily: "'JetBrains Mono', monospace",
  };

  const saveProfile = async () => {
    setLoading(true); setMsg({ type: "", text: "" });
    try {
      await window.apiFetch("/api/user/me", {
        method: "PATCH",
        body: JSON.stringify({ username, currentPassword: currentPw || undefined, newPassword: newPw || undefined }),
      });
      const updated = { ...user, username };
      window.auth.setUser(updated);
      onUserUpdate(updated);
      setMsg({ type: "ok", text: "Saved!" });
      setCurrentPw(""); setNewPw("");
    } catch(e) { setMsg({ type: "err", text: e.message }); }
    setLoading(false);
  };

  const deleteAccount = async () => {
    if (!window.confirm(L.deleteWarning)) return;
    setLoading(true);
    try {
      await window.apiFetch("/api/user/me", { method: "DELETE", body: JSON.stringify({ password: deletePw }) });
      window.auth.clear();
      onUserUpdate(null);
      onClose();
    } catch(e) { setMsg({ type: "err", text: e.message }); }
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center" }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: T.pageBg, border: `1px solid ${T.borderMed}`, borderRadius: 14, padding: "28px", width: 420, animation: "fadeIn 0.18s ease" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, letterSpacing: 2, color: T.text }}>{L.accountSettingsTitle}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: T.textMuted, cursor: "pointer", fontSize: 18 }}>✕</button>
        </div>
        <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
          {["profile", "danger"].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              padding: "5px 14px", borderRadius: 5, fontSize: 10, cursor: "pointer", letterSpacing: 1,
              border: `1px solid ${tab === t ? T.borderStr : T.borderFaint}`,
              background: tab === t ? T.surfaceHov : "transparent",
              color: tab === t ? T.text : T.textSub, fontFamily: "'JetBrains Mono', monospace",
            }}>{t === "profile" ? L.profileTab : L.dangerTab}</button>
          ))}
        </div>

        {tab === "profile" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div>
              <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 2, marginBottom: 5 }}>{L.usernameLabel}</div>
              <input style={inp} value={username} onChange={e => setUsername(e.target.value)} />
            </div>
            <div style={{ height: 1, background: T.borderFaint, margin: "4px 0" }} />
            <div style={{ fontSize: 9, color: T.textLabel, letterSpacing: 2, marginBottom: 5 }}>{L.changePassword}</div>
            <input style={inp} type="password" placeholder={L.currentPassword} value={currentPw} onChange={e => setCurrentPw(e.target.value)} />
            <input style={inp} type="password" placeholder={L.newPassword} value={newPw} onChange={e => setNewPw(e.target.value)} />
            {msg.text && <div style={{ fontSize: 11, color: msg.type === "ok" ? T.green : "#ff5050" }}>{msg.text}</div>}
            <button onClick={saveProfile} disabled={loading} style={{
              padding: "11px", borderRadius: 6, border: "none", background: T.surfaceMed,
              color: T.text, fontSize: 11, fontWeight: 700, letterSpacing: 1, cursor: "pointer",
              fontFamily: "'JetBrains Mono', monospace",
            }}>{loading ? "..." : L.saveChanges}</button>
          </div>
        )}

        {tab === "danger" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontSize: 11, color: T.textMuted, lineHeight: 1.6, marginBottom: 6 }}>
              {L.deleteWarning}
            </div>
            <input style={inp} type="password" placeholder={L.confirmPassword} value={deletePw} onChange={e => setDeletePw(e.target.value)} />
            {msg.text && <div style={{ fontSize: 11, color: "#ff5050" }}>{msg.text}</div>}
            <button onClick={deleteAccount} disabled={loading} style={{
              padding: "11px", borderRadius: 6, border: "1px solid rgba(255,80,80,0.3)",
              background: "rgba(255,80,80,0.08)", color: "#ff5050", fontSize: 11, fontWeight: 700,
              letterSpacing: 1, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
            }}>{loading ? "..." : L.deleteAccount}</button>
          </div>
        )}
      </div>
    </div>
  );
}
